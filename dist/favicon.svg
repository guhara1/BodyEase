<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 간다GO 파비콘 — 딥네이비 라운드 사각 + 오렌지 그라디언트 GO 도트 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101a30"/>
      <stop offset="1" stop-color="#070b16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff7a18"/>
      <stop offset="1" stop-color="#ff9d2f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0.55" stop-color="#ff7a18" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ff7a18" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 글로우 -->
  <circle cx="256" cy="256" r="230" fill="url(#glow)"/>

  <!-- 오렌지 도트 -->
  <circle cx="256" cy="256" r="164" fill="url(#accent)"/>

  <!-- GO 레터마크 -->
  <text x="256" y="262" text-anchor="middle" dominant-baseline="central"
        font-family="Pretendard, -apple-system, 'Segoe UI', Arial, sans-serif"
        font-weight="800" font-size="150" letter-spacing="-4"
        fill="#1a0d00">GO</text>
</svg>
